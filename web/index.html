<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="StyleAI - 智能穿搭助手">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="StyleAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>StyleAI - 智能穿搭助手</title>
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FDFBF9;
    }
    .loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #D4A5A5, #A8C5B5);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loading-icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
    .loading-text {
      color: #4A4A4A;
      font-size: 18px;
      font-weight: 600;
    }
    .loading-sub {
      color: #8A8A8A;
      font-size: 14px;
      margin-top: 8px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>
    <div class="loading-text">StyleAI</div>
    <div class="loading-sub">智能穿搭助手</div>
  </div>
  <script src="flutter.js" defer></script>
</body>
</html>
