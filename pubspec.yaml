name: styleai
description: 智能穿搭助手 - AI驱动的个人衣橱管理
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # 网络
  dio: ^5.3.3
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # 图片/相机
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # 依赖注入
  get_it: ^7.6.4
  injectable: ^2.3.2

  # 路由
  go_router: ^12.1.1

  # UI组件
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  pull_to_refresh: ^2.0.0

  # 功能库
  permission_handler: ^11.0.1
  geolocator: ^10.1.0
  connectivity_plus: ^5.0.2
  logger: ^2.0.2
  intl: ^0.18.1

  # Supabase后端
  supabase_flutter: ^1.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
